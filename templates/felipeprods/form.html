{% extends "base.html" %}
{% block title %}{{ "Editar" if felipeprod else "Novo" }} Produto — AzureShop{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-box-seam"></i> {{ "Editar" if felipeprod else "Novo" }} Produto</h5>
      </div>
      <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Marca *</label>
            <input name="marca" class="form-control" required value="{{ felipeprod.Marca if felipeprod else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Modelo *</label>
            <input name="modelo" class="form-control" required value="{{ felipeprod.Modelo if felipeprod else '' }}">
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Valor (R$) *</label>
              <input name="valor" type="number" step="0.01" min="0" class="form-control" required
                     value="{{ felipeprod.Valor if felipeprod else '' }}">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Quantidade *</label>
              <input name="quantidade" type="number" min="0" class="form-control" required
                     value="{{ felipeprod.Quantidade if felipeprod else '' }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Foto do Produto</label>
            {% if felipeprod and felipeprod.FotoURL %}
              <div class="mb-2">
                <img src="{{ felipeprod.FotoURL }}" class="felipeprod-thumb">
                <small class="text-muted ms-2">Foto atual</small>
              </div>
            {% endif %}
            <input name="foto" type="file" class="form-control" accept="image/*">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-azure"><i class="bi bi-check-lg"></i> Salvar</button>
            <a href="/felipeprods" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
