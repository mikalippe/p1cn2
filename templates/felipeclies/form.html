{% extends "base.html" %}
{% block title %}{{ "Editar" if felipeclie else "Novo" }} Cliente — AzureShop{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-person-plus"></i> {{ "Editar" if felipeclie else "Novo" }} Cliente</h5>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Nome completo *</label>
            <input name="nome" class="form-control" required value="{{ felipeclie.Nome if felipeclie else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">E-mail *</label>
            <input name="email" type="email" class="form-control" required value="{{ felipeclie.Email if felipeclie else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input name="telefone" class="form-control" value="{{ felipeclie.Telefone if felipeclie else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Endereço</label>
            <input name="endereco" class="form-control" value="{{ felipeclie.Endereco if felipeclie else '' }}">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-azure"><i class="bi bi-check-lg"></i> Salvar</button>
            <a href="/felipeclies" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
